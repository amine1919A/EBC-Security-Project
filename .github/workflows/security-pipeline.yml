name: EBC Security Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'

env:
  DOCKER_IMAGE: ghcr.io/${{ github.repository }}/ebc-app:${{ github.sha }}

jobs:
  # ─── BUILD ───
  build:
    name: Build Docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: |
          docker build -t ebc-app:${{ github.sha }} -f app/Dockerfile app/
          echo "Image build: ebc-app:${{ github.sha }}"

  # ─── ÉTAPE 1 : SAST ───
  sast-sonarqube:
    name: SAST - SonarQube
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL || 'https://sonarcloud.io' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: SonarQube Scan
        uses: sonarsource/sonarcloud-github-action@v2
        with:
          args: >
            -Dsonar.projectKey=ebc-app
            -Dsonar.sources=.
            -Dsonar.exclusions=vendor/**,node_modules/**,var/**
            -Dsonar.php.coverage.reportPaths=coverage.xml
            -Dsonar.qualitygate.wait=true

  sast-phpstan:
    name: SAST - PHPStan
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: PHPStan Analysis
        uses: docker://php:8.2-cli
        with:
          args: >
            sh -c "apt-get update -qq && apt-get install -y -qq git unzip curl >/dev/null 2>&1 &&
                   curl -sS https://getcomposer.org/installer | php >/dev/null 2>&1 &&
                   mv composer.phar /usr/local/bin/composer &&
                   cd app/symfony && composer install --no-interaction -q &&
                   vendor/bin/phpstan analyse --level=max src/ --error-format=github || true"

  # ─── ÉTAPE 2 : SCA ───
  sca-trivy:
    name: SCA - Trivy
    runs-on: ubuntu-latest
    needs: [build]
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Trivy Image Scan
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          image-ref: ebc-app:${{ github.sha }}
          format: json
          output: trivy-report.json
          severity: CRITICAL,HIGH
          exit-code: '0'
      - name: Trivy FS Scan
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          scan-type: fs
          format: json
          output: trivy-fs-report.json
          severity: CRITICAL,HIGH
          exit-code: '0'
      - name: Upload Trivy Report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-reports
          path: trivy-*.json

  sca-snyk:
    name: SCA - Snyk
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Snyk Scan
        uses: snyk/actions/php@master
        with:
          args: --severity-threshold=high
          command: test

  # ─── ÉTAPE 3 : SECRETS ───
  secrets-gitleaks:
    name: Secrets - Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── ÉTAPE 4 : TESTS ───
  test-unit:
    name: Tests Unitaires
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: PHPUnit
        uses: docker://php:8.2-cli
        with:
          args: >
            sh -c "apt-get update -qq && apt-get install -y -qq git unzip curl >/dev/null 2>&1 &&
                   curl -sS https://getcomposer.org/installer | php >/dev/null 2>&1 &&
                   mv composer.phar /usr/local/bin/composer &&
                   cd app/symfony && composer install --no-interaction -q &&
                   vendor/bin/phpunit --log-junit=phpunit-report.xml || true"

  test-api:
    name: Tests API Sécurité
    runs-on: ubuntu-latest
    needs: [build]
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Start services
        run: |
          docker run -d --name ebc-mysql \
            -e MYSQL_ROOT_PASSWORD=ebc_secret_2024 \
            -e MYSQL_DATABASE=ebc_sulu \
            -e MYSQL_USER=ebc_user \
            -e MYSQL_PASSWORD=ebc_pass_2024 \
            mysql:8.0
          docker run -d --name ebc-elasticsearch \
            -e discovery.type=single-node \
            -e ES_JAVA_OPTS="-Xms512m -Xmx512m" \
            -e xpack.security.enabled=false \
            elasticsearch:8.10.2
          docker run -d --name app \
            ebc-app:${{ github.sha }}
          docker run -d --name ebc-nginx --link app \
            -v ${{ github.workspace }}/app/nginx/default.conf:/etc/nginx/conf.d/default.conf \
            -p 8080:80 \
            nginx:alpine
      - name: Wait for services
        run: sleep 30
      - name: API Tests
        run: |
          cd ci-cd/scripts/api-tests
          pip install -q -r requirements.txt 2>/dev/null
          pytest test_api.py -v --junitxml=../../api-results.xml || true
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-results
          path: api-results.xml

  # ─── ÉTAPE 5 : DAST ───
  dast-zap:
    name: DAST - OWASP ZAP
    runs-on: ubuntu-latest
    needs: [build, test-api]
    if: always()
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Start app for ZAP
        run: |
          docker run -d --name ebc-mysql \
            -e MYSQL_ROOT_PASSWORD=ebc_secret_2024 \
            -e MYSQL_DATABASE=ebc_sulu \
            -e MYSQL_USER=ebc_user \
            -e MYSQL_PASSWORD=ebc_pass_2024 \
            mysql:8.0
          docker run -d --name ebc-elasticsearch \
            -e discovery.type=single-node \
            -e ES_JAVA_OPTS="-Xms512m -Xmx512m" \
            -e xpack.security.enabled=false \
            elasticsearch:8.10.2
          docker run -d --name app \
            ebc-app:${{ github.sha }}
          docker run -d --name ebc-nginx --link app \
            -v ${{ github.workspace }}/app/nginx/default.conf:/etc/nginx/conf.d/default.conf \
            -p 8080:80 \
            nginx:alpine
          sleep 15
      - name: ZAP Scan
        uses: zaproxy/action-baseline@v0.7.0
        with:
          target: http://localhost:8080
          rules_file_name: security-tools/owasp-zap/policies/EBC-policy.policy
          issue_title: ZAP Scan Report
          allow_issue_writing: false
      - name: Upload ZAP Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: zap-report.html

  dast-nikto:
    name: DAST - Nikto
    runs-on: ubuntu-latest
    needs: [build, test-api]
    if: always()
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Start app for Nikto
        run: |
          docker run -d --name ebc-mysql \
            -e MYSQL_ROOT_PASSWORD=ebc_secret_2024 \
            -e MYSQL_DATABASE=ebc_sulu \
            -e MYSQL_USER=ebc_user \
            -e MYSQL_PASSWORD=ebc_pass_2024 \
            mysql:8.0
          docker run -d --name ebc-elasticsearch \
            -e discovery.type=single-node \
            -e ES_JAVA_OPTS="-Xms512m -Xmx512m" \
            -e xpack.security.enabled=false \
            elasticsearch:8.10.2
          docker run -d --name app \
            ebc-app:${{ github.sha }}
          docker run -d --name ebc-nginx --link app \
            -v ${{ github.workspace }}/app/nginx/default.conf:/etc/nginx/conf.d/default.conf \
            -p 8080:80 \
            nginx:alpine
          sleep 15
      - name: Nikto Scan
        run: |
          git clone --depth 1 https://github.com/sullo/nikto /tmp/nikto
          perl /tmp/nikto/program/nikto.pl -h http://localhost:8080 -Format xml \
            -output /tmp/nikto-report.xml || true
          if [ -f /tmp/nikto-report.xml ]; then
            cp /tmp/nikto-report.xml nikto-report.xml
          fi
      - name: Upload Nikto Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nikto-report
          path: nikto-report.xml

  # ─── ÉTAPE 6 : KPIs ───
  kpi-aggregate:
    name: KPIs - Métriques
    runs-on: ubuntu-latest
    needs: [dast-zap, dast-nikto]
    if: always()
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Aggregate KPIs
        run: |
          pip install requests prometheus-client pandas pyyaml -q 2>/dev/null
          python ci-cd/scripts/aggregate-kpi.py || true
      - name: Upload KPI Report
        uses: actions/upload-artifact@v4
        with:
          name: kpi-metrics
          path: kpi-metrics.json
