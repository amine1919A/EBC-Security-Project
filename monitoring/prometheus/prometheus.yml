global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

rule_files:
  - "alert.rules.yml"

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'sonarqube'
    metrics_path: '/api/metrics'
    static_configs:
      - targets: ['sonarqube:9000']
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: sonarqube:9000

  - job_name: 'app'
    static_configs:
      - targets: ['app:9000']
    metrics_path: '/health'
    scheme: http

  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx:80']
    metrics_path: '/health'
    scheme: http

  - job_name: 'mysql'
    static_configs:
      - targets: ['mysql:3306']
    metrics_path: '/'
    scheme: http

  - job_name: 'elasticsearch'
    static_configs:
      - targets: ['elasticsearch:9200']
    metrics_path: '/_cluster/health'
