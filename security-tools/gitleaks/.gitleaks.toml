title = "EBC Gitleaks Security Configuration"

[allowlist]
description = "Excluded paths and known-safe patterns"
paths = [
    "vendor/",
    "node_modules/",
    ".git/",
    "var/",
]

[[rules]]
id = "ebc-api-key"
description = "EBC API Key"
regex = '''(?i)(EBC_API[_-]?KEY|ebc_api[_-]?key)[\s]*[:=][\s]*['\"][A-Za-z0-9]{32,}['\"]'''
secret_group = 1
severity = "high"

[[rules]]
id = "ebc-database-password"
description = "EBC Database Password"
regex = '''(?i)(MYSQL|DATABASE|DB)[_-]?(PASSWORD|PASS)[\s]*[:=][\s]*['\"]['\"A-Za-z0-9!@#$%^&*()_+]{8,}['\"]'''
secret_group = 1
severity = "critical"

[[rules]]
id = "ebc-jwt-secret"
description = "EBC JWT Secret"
regex = '''(?i)(JWT[_-]?SECRET|jwt[_-]?secret)[\s]*[:=][\s]*['\"][A-Za-z0-9!@#$%^&*()_+]{16,}['\"]'''
secret_group = 1
severity = "critical"

[[rules]]
id = "generic-private-key"
description = "Generic Private Key"
regex = '''-----BEGIN (RSA |EC |DSA |SSH (2 )?)?PRIVATE KEY-----'''
secret_group = 1
severity = "high"

[[rules]]
id = "generic-api-token"
description = "Generic API Token"
regex = '''(?i)(token|api[_-]?key|secret|password|passwd)[\s]*[:=][\s]*['\"][A-Za-z0-9!@#$%^&*()_+]{16,}['\"]'''
secret_group = 1
severity = "medium"
